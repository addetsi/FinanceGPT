
services:

  neo4j:
    image: neo4j:5.18
    container_name: financegpt-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: financegpt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: financegpt-app
    ports:
      - "8501:8501"
    environment:
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - NEO4J_URI=bolt://neo4j:7687
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./data/chat_history.db:/app/data/chat_history.db
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  neo4j_data:
  ollama_data:
